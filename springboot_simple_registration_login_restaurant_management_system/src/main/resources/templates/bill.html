<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Invoice</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f4f6f9;
        }

        .invoice-box {
            max-width: 700px;
            margin: auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
        }

        .total {
            font-size: 18px;
            font-weight: bold;
        }
    </style>
</head>

<body>

<div class="container mt-5">

    <div class="invoice-box shadow-sm">

        <!-- Header -->
        <div class="header">
            <h2>🍽 Restaurant Invoice</h2>
            <p>Thank you for dining with us!</p>
        </div>

        <!-- Order Info -->
        <p><strong>Order ID:</strong> <span th:text="${order.id}"></span></p>
        <p><strong>Table No:</strong> <span th:text="${order.tableNumber}"></span></p>
        <p><strong>Status:</strong> <span th:text="${order.status}"></span></p>

        <hr>

        <!-- Items Table -->
        <table class="table">
            <thead>
                <tr>
                    <th>Item</th>
                    <th>Qty</th>
                    <th>Price</th>
                    <th>Total</th>
                </tr>
            </thead>

            <tbody>
                <tr th:each="item : ${order.items}">
                    <td th:text="${item.menuItem.name}"></td>
                    <td th:text="${item.quantity}"></td>
                    <td>₹ <span th:text="${item.menuItem.price}"></span></td>
                    <td>
                        ₹ <span th:text="${item.quantity * item.menuItem.price}"></span>
                    </td>
                </tr>
            </tbody>
        </table>

        <hr>

        <!-- Total -->
        <div class="text-end">
            <p>Tax (5% included)</p>
            <p class="total">
                Total: ₹ <span th:text="${order.totalAmount}"></span>
            </p>
        </div>

        <!-- Back Button -->
        <div class="text-center mt-4">
            <a href="/orders" class="btn btn-dark">Back to Orders</a>
        </div>

    </div>

</div>

</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<title>Admin Dashboard</title>

<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
	rel="stylesheet">

<style>
body {
	background: #f4f6f9;
}

.sidebar {
	height: 100vh;
	width: 230px;
	position: fixed;
	background: #1f2937;
	padding: 20px;
}

.sidebar h4 {
	color: white;
}

.sidebar a {
	display: block;
	color: #9ca3af;
	text-decoration: none;
	padding: 10px;
	border-radius: 8px;
}

.sidebar a:hover {
	background: #374151;
	color: white;
}

.content {
	margin-left: 250px;
	padding: 20px;
}

.card {
	border-radius: 12px;
}
</style>
</head>

<body>

	<!-- Sidebar -->
	<div class="sidebar">
		<h4>Admin</h4>

		<a href="/dashboard">Dashboard</a> <a href="/menu">Menu</a> <a
			href="/orders">Orders</a> <a href="/staff">Staff</a>
	</div>

	<!-- Content -->
	<div class="content">

		<h2 class="mb-4">Dashboard</h2>

		<!-- Stats Cards -->
		<div class="row g-3">

			<div class="col-md-3">
				<div class="card p-3 shadow-sm text-center">
					<h6>Total Orders</h6>
					<h3 th:text="${totalOrders}"></h3>
				</div>
			</div>

			<div class="col-md-3">
				<div class="card p-3 shadow-sm text-center">
					<h6>Revenue</h6>
					<h3>
						₹ <span th:text="${totalRevenue}"></span>
					</h3>
				</div>
			</div>

			<div class="col-md-3">
				<div class="card p-3 shadow-sm text-center">
					<h6>Menu Items</h6>
					<h3 th:text="${totalMenu}"></h3>
				</div>
			</div>

			<div class="col-md-3">
				<div class="card p-3 shadow-sm text-center">
					<h6>Staff</h6>
					<h3 th:text="${totalStaff}"></h3>
				</div>
			</div>

		</div>

	</div>

</body>
</html>

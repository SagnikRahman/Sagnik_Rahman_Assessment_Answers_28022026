<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Menu Management</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body { background: #f4f6f9; }

        .sidebar {
            height: 100vh;
            width: 230px;
            position: fixed;
            background: #1f2937;
            padding: 20px;
        }

        .sidebar h4 { color: white; }

        .sidebar a {
            display: block;
            color: #9ca3af;
            text-decoration: none;
            padding: 10px;
            border-radius: 8px;
        }

        .sidebar a:hover {
            background: #374151;
            color: white;
        }

        .content {
            margin-left: 250px;
            padding: 20px;
        }

        .card { border-radius: 12px; }
    </style>
</head>

<body>

<!-- Sidebar -->
<div class="sidebar">
    <h4>Admin</h4>

    <a href="/dashboard">Dashboard</a>
    <a href="/menu">Menu</a>
    <a href="/orders">Orders</a>
    <a href="/staff">Staff</a>
</div>

<!-- Content -->
<div class="content">

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>Menu Management</h2>

        <!-- Add Button -->
        <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#addModal">
            + Add Item
        </button>
    </div>

    <!-- Success Alert -->
    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

    <!-- Table -->
    <div class="card p-3 shadow-sm">
        <table class="table table-hover">

            <thead class="table-dark">
                <tr>
                    <th>Name</th>
                    <th>Category</th>
                    <th>Price</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>

            <tbody>
                <tr th:each="item : ${items}">
                    <td th:text="${item.name}"></td>
                    <td th:text="${item.category}"></td>
                    <td>₹ <span th:text="${item.price}"></span></td>

                    <td>
                        <span class="badge bg-success" th:if="${item.available}">Available</span>
                        <span class="badge bg-secondary" th:if="${!item.available}">Out</span>
                    </td>

                    <td>
                        <a th:href="@{/menu/delete/{id}(id=${item.id})}"
                           class="btn btn-danger btn-sm"
                           onclick="return confirm('Delete this item?')">
                           Delete
                        </a>
                    </td>
                </tr>
            </tbody>

        </table>
    </div>

</div>

<!-- 🔥 Add Item Modal -->
<div class="modal fade" id="addModal">
    <div class="modal-dialog">
        <form action="/menu/add" method="post" class="modal-content p-3">

            <h5>Add Menu Item</h5>

            <input name="name" class="form-control mb-2" placeholder="Item Name" required>

            <input name="category" class="form-control mb-2" placeholder="Category (Veg, Drinks...)" required>

            <input name="price" type="number" step="0.01" class="form-control mb-2" placeholder="Price" required>

            <div class="form-check mb-2">
                <input type="checkbox" name="available" class="form-check-input">
                <label class="form-check-label">Available</label>
            </div>

            <button class="btn btn-success">Save</button>

        </form>
    </div>
</div>

<!-- Bootstrap JS (for modal) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Staff Management</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body { background: #f4f6f9; }

        .sidebar {
            height: 100vh;
            width: 230px;
            position: fixed;
            background: #1f2937;
            padding: 20px;
        }

        .sidebar h4 { color: white; }

        .sidebar a {
            display: block;
            color: #9ca3af;
            text-decoration: none;
            padding: 10px;
            border-radius: 8px;
        }

        .sidebar a:hover {
            background: #374151;
            color: white;
        }

        .content {
            margin-left: 250px;
            padding: 20px;
        }

        .card { border-radius: 12px; }
    </style>
</head>

<body>

<!-- Sidebar -->
<div class="sidebar">
    <h4>Admin</h4>

    <a href="/dashboard">Dashboard</a>
    <a href="/menu">Menu</a>
    <a href="/orders">Orders</a>
    <a href="/staff">Staff</a>
</div>

<!-- Content -->
<div class="content">

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>Staff Management</h2>

        <!-- Add Staff Button -->
        <button class="btn btn-dark" data-bs-toggle="modal" data-bs-target="#staffModal">
            + Add Staff
        </button>
    </div>

    <!-- Staff Table -->
    <div class="card p-3 shadow-sm">
        <table class="table table-hover">

            <thead class="table-dark">
                <tr>
                    <th>Name</th>
                    <th>Role</th>
                    <th>Actions</th>
                </tr>
            </thead>

            <tbody>
                <tr th:each="s : ${staffList}">
                    <td th:text="${s.name}"></td>
                    <td>
                        <span class="badge bg-primary" th:text="${s.role}"></span>
                    </td>

                    <td>
                        <a th:href="@{/staff/delete/{id}(id=${s.id})}"
                           class="btn btn-danger btn-sm"
                           onclick="return confirm('Delete this staff?')">
                           Delete
                        </a>
                    </td>
                </tr>
            </tbody>

        </table>
    </div>

</div>

<!-- 🔥 Add Staff Modal -->
<div class="modal fade" id="staffModal">
    <div class="modal-dialog">
        <form action="/staff/add" method="post" class="modal-content p-3">

            <h5>Add Staff</h5>

            <input name="name" class="form-control mb-2" placeholder="Staff Name" required>

            <select name="role" class="form-control mb-2">
                <option value="Chef">Chef</option>
                <option value="Waiter">Waiter</option>
                <option value="Manager">Manager</option>
            </select>

            <button class="btn btn-success">Save</button>

        </form>
    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
